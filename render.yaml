services:
  - type: web
    name: formula-forge
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false  # Set in Render dashboard
      # AWS credentials for Nova Reel video generation (optional - falls back to DALL-E 3)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-2
      - key: FORGE_S3_BUCKET
        value: formulaforge-reel-outputs
