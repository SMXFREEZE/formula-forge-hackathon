services:
  - type: web
    name: formula-forge
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      # AWS credentials for Bedrock (Nova), Polly, and S3
      - key: AWS_ACCESS_KEY_ID
        sync: false  # Set in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false  # Set in Render dashboard
      - key: AWS_REGION
        value: us-east-1
      - key: FORGE_S3_BUCKET
        value: formulaforge-reel-outputs
